<!DOCTYPE html>
<html lang="fr">
<head>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: #f4f0e8; color: #1a1a1a; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
.serif { font-family: 'Fraunces', Georgia, serif; }

/* INPUTS */
input, select, textarea {
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(26,26,26,0.15);
  border-radius: 8px;
  padding: 11px 12px;
  font-family: inherit;
  font-size: 15px;
  width: 100%;
  color: #1a1a1a;
  -webkit-appearance: none;
  appearance: none;
}
input[type="checkbox"] { width: 20px; height: 20px; -webkit-appearance: checkbox; appearance: checkbox; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #c2410c; background: white; }
label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #555; display: block; margin-bottom: 4px; }
textarea { resize: vertical; min-height: 70px; }

/* LAYOUT */
.card { background: rgba(255,255,255,0.55); border: 1px solid rgba(26,26,26,0.08); border-radius: 14px; padding: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-main { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 900px) {
  .grid-main { grid-template-columns: minmax(0,1fr) 380px; gap: 24px; }
  .card { padding: 24px; }
}
@media (max-width: 600px) {
  .grid-2 { grid-template-columns: 1fr; }
  .hide-mobile { display: none !important; }
}
.check-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: rgba(255,255,255,0.5); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
.check-row input { width: auto; flex-shrink: 0; }

/* HEADER */
header { border-bottom: 1px solid rgba(26,26,26,0.1); background: #f4f0e8; position: sticky; top: 0; z-index: 10; padding-top: env(safe-area-inset-top); }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.logo-block { display: flex; align-items: center; gap: 10px; min-width: 0; }
.logo { width: 38px; height: 38px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #f4f0e8; font-size: 20px; }
.brand { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; line-height: 1; }
.sub { font-size: 10px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
nav { display: flex; gap: 4px; background: rgba(255,255,255,0.6); padding: 4px; border-radius: 10px; flex-shrink: 0; }
.btn-tab { padding: 9px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; font-family: inherit; background: transparent; color: #1a1a1a; }
.btn-tab.active { background: #1a1a1a; color: #f4f0e8; }

main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 120px; }
.eyebrow { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #c2410c; font-weight: 700; }
h1 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500; line-height: 1.15; margin: 4px 0 0 0; }
h2 { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; margin: 0 0 14px 0; display: flex; align-items: center; gap: 8px; }
h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }

/* BUTTONS */
.btn { padding: 13px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; width: 100%; }
.btn-primary { background: #c2410c; color: white; }
.btn-secondary { background: rgba(255,255,255,0.7); color: #1a1a1a; border: 1px solid rgba(26,26,26,0.15); }
.btn-dark { background: #1a1a1a; color: white; }
.btn-danger { background: #b91c1c; color: white; }

/* PRICE CARD */
.price-card { background: #1a1a1a; color: #f4f0e8; padding: 22px; border-radius: 14px; }
.price-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px; }
.price-amount { font-family: 'Fraunces', serif; font-size: 38px; font-weight: 500; line-height: 1; color: #fff; word-break: break-word; }
.price-sub { font-size: 12px; opacity: 0.6; margin-top: 4px; }
.price-detail-btn { margin-top: 14px; width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.1); color: #f4f0e8; border: none; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
.detail-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; opacity: 0.92; gap: 8px; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; padding: 14px 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); display: flex; align-items: center; gap: 10px; z-index: 100; max-width: 90vw; font-weight: 600; font-size: 14px; animation: slideIn 0.2s ease-out; }
.toast-ok { background: #15803d; }
.toast-err { background: #b91c1c; }
@keyframes slideIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: #f4f0e8; border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; }

/* HISTORY */
.histo-item { padding: 16px; }
.histo-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.histo-num { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; }
.histo-meta { font-size: 12px; color: #888; margin-top: 2px; }
.histo-price { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; color: #c2410c; white-space: nowrap; }
.histo-trip { font-size: 13px; color: #444; margin-bottom: 12px; }
.histo-actions { display: flex; gap: 8px; }

/* ICONS */
.ico { display: inline-flex; align-items: center; justify-content: center; }
.chevron { transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(90deg); }

/* INSTALL HINT */
.install-hint { background: #1a1a1a; color: #f4f0e8; padding: 12px 16px; font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.install-hint button { background: transparent; color: #f4f0e8; border: 1px solid rgba(255,255,255,0.3); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
@media (display-mode: standalone) { .install-hint { display: none !important; } }

/* DEVIS PRINT VIEW */
.printable { padding: 28px 22px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: white; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); }
.printable-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #1a1a1a; padding-bottom: 16px; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
.printable table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
.printable th { background: #1a1a1a; color: white; padding: 8px 10px; text-align: left; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
.printable th:last-child { text-align: right; }
.printable td { padding: 8px 10px; border-bottom: 1px solid #eee; }
.printable .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.totals-table { min-width: 240px; font-size: 12px; margin-left: auto; }
.totals-table td { padding: 4px 10px; border: none; }
.totals-table tr.total-final { background: #1a1a1a; color: white; }
.totals-table tr.total-final td { padding: 10px; font-weight: 700; }
.muted { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 4px; }

/* PRINT STYLES */
@media print {
  body { background: white; padding: 0; }
  header, nav, .install-hint, .no-print { display: none !important; }
  main { padding: 0; max-width: 100%; }
  .printable { border: none; padding: 0; }
}
</style>

<body>
<div class="install-hint" id="install-hint">
  <span>💡 Pour installer comme app : <strong>Partager → Ajouter à l'écran d'accueil</strong></span>
  <button onclick="document.getElementById('install-hint').style.display='none'">OK</button>
</div>
<div id="app"></div>

<script>
'use strict';

// ============ TARIFS IDF 2026 ============
const TARIFS = {
  baseM3: 45, kmInclus: 30, prixKm: 2, longueDistance: 300, majLongueDistance: 0.40,
  etageSansAscenseur: 5, portage: 3, emballage: 20, deballage: 14, cartonsFournis: 6,
  fragile: 70, demontage: 40, objetLourd: 400, garde_meuble: 22,
  aotStationnement: 80, monteMeubles: 350,
  majHauteSaison: 0.25, majWeekend: 0.15, majFerie: 0.30,
};

// ============ STATE ============
const state = {
  view: 'nouveau',
  devis: null,
  entreprise: { nom: 'Votre Société de Déménagement', adresse: '', tel: '', email: '', siret: '' },
  historique: [],
  showEnt: false,
  showPrice: false,
  confirmDel: null,
};

function emptyDevis() {
  return {
    id: Date.now().toString() + Math.random().toString(36).slice(2, 7),
    date: new Date().toISOString().slice(0, 10),
    numero: '',
    client: { nom: '', tel: '', email: '' },
    depart: { ville: '', adresse: '', etage: 0, ascenseur: true, portage: false },
    arrivee: { ville: '', adresse: '', etage: 0, ascenseur: true, portage: false },
    volume: 20,
    distance: 30,
    options: { emballage: false, deballage: false, cartons: false, demontage: 0, fragile: 0, objetsLourds: 0, gardeMeuble: 0, aotStationnement: false, monteMeubles: 0 },
    majoration: 'aucune',
    remise: 0,
    tva: 10,
    notes: 'Devis valable 30 jours. Acompte de 30% à la réservation.',
  };
}

state.devis = emptyDevis();

// ============ PERSISTENCE (localStorage) ============
function loadAll() {
  try {
    const e = localStorage.getItem('devis_entreprise');
    if (e) state.entreprise = JSON.parse(e);
  } catch (_) {}
  try {
    const h = localStorage.getItem('devis_historique');
    if (h) state.historique = JSON.parse(h);
  } catch (_) {}
}
function persistEntreprise() {
  try { localStorage.setItem('devis_entreprise', JSON.stringify(state.entreprise)); } catch (_) {}
}
function persistHistorique() {
  try { localStorage.setItem('devis_historique', JSON.stringify(state.historique)); } catch (_) {}
}

// ============ CALCUL ============
function calculer(d) {
  const lignes = [];
  lignes.push({ label: 'Transport (' + d.volume + ' m³ × ' + TARIFS.baseM3 + ' €)', montant: d.volume * TARIFS.baseM3 });
  const kmSup = Math.max(0, d.distance - TARIFS.kmInclus);
  if (kmSup > 0) lignes.push({ label: 'Distance (' + kmSup + ' km × ' + TARIFS.prixKm + ' €)', montant: kmSup * TARIFS.prixKm });
  if (!d.depart.ascenseur && d.depart.etage > 0) lignes.push({ label: 'Étages départ sans ascenseur (' + d.depart.etage + ' × ' + d.volume + ' m³)', montant: d.depart.etage * d.volume * TARIFS.etageSansAscenseur });
  if (!d.arrivee.ascenseur && d.arrivee.etage > 0) lignes.push({ label: 'Étages arrivée sans ascenseur (' + d.arrivee.etage + ' × ' + d.volume + ' m³)', montant: d.arrivee.etage * d.volume * TARIFS.etageSansAscenseur });
  if (d.depart.portage) lignes.push({ label: 'Portage long départ', montant: d.volume * TARIFS.portage });
  if (d.arrivee.portage) lignes.push({ label: 'Portage long arrivée', montant: d.volume * TARIFS.portage });
  if (d.options.aotStationnement) lignes.push({ label: 'AOT stationnement (Paris)', montant: TARIFS.aotStationnement });
  if (d.options.monteMeubles > 0) lignes.push({ label: 'Monte-meubles (' + d.options.monteMeubles + ')', montant: d.options.monteMeubles * TARIFS.monteMeubles });
  if (d.options.emballage) lignes.push({ label: 'Service emballage', montant: d.volume * TARIFS.emballage });
  if (d.options.deballage) lignes.push({ label: 'Service déballage', montant: d.volume * TARIFS.deballage });
  if (d.options.cartons) lignes.push({ label: 'Fourniture cartons + papier bulle', montant: d.volume * TARIFS.cartonsFournis });
  if (d.options.demontage > 0) lignes.push({ label: 'Démontage/remontage (' + d.options.demontage + ' meubles)', montant: d.options.demontage * TARIFS.demontage });
  if (d.options.fragile > 0) lignes.push({ label: 'Objets fragiles (' + d.options.fragile + ' lots)', montant: d.options.fragile * TARIFS.fragile });
  if (d.options.objetsLourds > 0) lignes.push({ label: 'Objets lourds / piano (' + d.options.objetsLourds + ')', montant: d.options.objetsLourds * TARIFS.objetLourd });
  if (d.options.gardeMeuble > 0) lignes.push({ label: 'Garde-meuble (' + d.options.gardeMeuble + ' mois × ' + d.volume + ' m³)', montant: d.options.gardeMeuble * d.volume * TARIFS.garde_meuble });

  let st = lignes.reduce(function (s, l) { return s + l.montant; }, 0);
  if (d.distance > TARIFS.longueDistance) {
    const m = st * TARIFS.majLongueDistance;
    lignes.push({ label: 'Longue distance (>' + TARIFS.longueDistance + ' km, +40%)', montant: m });
    st += m;
  }
  let mt = 0, ml = '';
  if (d.majoration === 'weekend') { mt = TARIFS.majWeekend; ml = 'Week-end (+15%)'; }
  else if (d.majoration === 'ferie') { mt = TARIFS.majFerie; ml = 'Jour férié (+30%)'; }
  else if (d.majoration === 'hauteSaison') { mt = TARIFS.majHauteSaison; ml = 'Haute saison mai-sept (+25%)'; }
  if (mt > 0) { const m = st * mt; lignes.push({ label: ml, montant: m }); st += m; }
  if (d.remise > 0) { lignes.push({ label: 'Remise commerciale', montant: -d.remise }); st -= d.remise; }
  const ht = Math.max(0, st);
  const tva = ht * (d.tva / 100);
  return { lignes: lignes, ht: ht, tva: tva, ttc: ht + tva };
}

const fmt = function (n) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n).replace(/\u00a0/g, ' ').replace(/\u202f/g, ' '); };
const esc = function (s) { return String(s || '').replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); };

// ============ UI HELPERS ============
function showToast(type, msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = (type === 'ok' ? '✓ ' : '⚠ ') + msg;
  document.body.appendChild(t);
  setTimeout(function () { t.remove(); }, 2500);
}

// ============ HANDLERS ============
function setView(v) { state.view = v; render(); window.scrollTo(0, 0); }

function setField(path, val) {
  const parts = path.split('.');
  let obj = state.devis;
  for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = val;
}
function setEntreprise(field, val) { state.entreprise[field] = val; persistEntreprise(); }

function onInput(el) {
  const path = el.dataset.bind;
  const type = el.dataset.type || 'string';
  let v = el.value;
  if (type === 'number') v = Number(v) || 0;
  if (type === 'bool') v = el.checked;
  setField(path, v);
  updatePrice();
}

function onEntInput(el) {
  setEntreprise(el.dataset.field, el.value);
  // Update header sub-title if needed
  const sub = document.querySelector('.sub');
  if (sub && el.dataset.field === 'nom') sub.textContent = el.value;
}

function selectAll(el) { try { el.select(); } catch (_) {} }

function sauver() {
  const num = state.devis.numero || 'DEV-' + new Date().getFullYear() + '-' + String(state.historique.length + 1).padStart(4, '0');
  const calcul = calculer(state.devis);
  const toSave = Object.assign({}, state.devis, { numero: num, _calcul: calcul });
  state.historique = [toSave].concat(state.historique.filter(function (d) { return d.id !== toSave.id; }));
  state.devis = toSave;
  persistHistorique();
  showToast('ok', 'Devis ' + num + ' enregistré');
  render();
}

function nouveau() { state.devis = emptyDevis(); setView('nouveau'); }
function ouvrir(id) { const d = state.historique.find(function (x) { return x.id === id; }); if (d) { state.devis = d; setView('nouveau'); } }
function supprimer(id) {
  state.historique = state.historique.filter(function (d) { return d.id !== id; });
  persistHistorique();
  state.confirmDel = null;
  showToast('ok', 'Devis supprimé');
  render();
}

function toggleEnt() { state.showEnt = !state.showEnt; render(); }
function togglePrice() { state.showPrice = !state.showPrice; updatePrice(); }

// ============ PDF (jsPDF) ============
function genererPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const calcul = calculer(state.devis);
  const e = state.entreprise;
  const d = state.devis;
  const dateStr = new Date().toLocaleDateString('fr-FR');
  let y = 18;

  // Header — entreprise (gauche)
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text(e.nom || '', 14, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  y += 6;
  if (e.adresse) { doc.text(e.adresse, 14, y); y += 4; }
  const contact = [e.tel, e.email].filter(Boolean).join(' · ');
  if (contact) { doc.text(contact, 14, y); y += 4; }
  if (e.siret) { doc.text('SIRET : ' + e.siret, 14, y); y += 4; }

  // DEVIS title (droite)
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.text('DEVIS', 196, 18, { align: 'right' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text('N° ' + (d.numero || '—'), 196, 25, { align: 'right' });
  doc.text('Émis le ' + dateStr, 196, 30, { align: 'right' });

  // Separator
  y = Math.max(y, 36);
  doc.setLineWidth(0.5);
  doc.line(14, y, 196, y);
  y += 8;

  // Client (gauche)
  doc.setFontSize(8);
  doc.setTextColor(110);
  doc.text('CLIENT', 14, y);
  doc.setTextColor(0);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text(d.client.nom || '—', 14, y + 5);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  let cy = y + 10;
  if (d.client.tel) { doc.text(d.client.tel, 14, cy); cy += 4; }
  if (d.client.email) { doc.text(d.client.email, 14, cy); cy += 4; }

  // Prestation (droite)
  doc.setFontSize(8);
  doc.setTextColor(110);
  doc.text('PRESTATION', 110, y);
  doc.setTextColor(0);
  doc.setFontSize(9);
  let py = y + 5;
  doc.text('Date : ' + new Date(d.date).toLocaleDateString('fr-FR'), 110, py); py += 4;
  const depTxt = 'Départ : ' + (d.depart.adresse || '') + ', ' + (d.depart.ville || '') + ' (ét. ' + d.depart.etage + (d.depart.ascenseur ? ', asc.' : '') + ')';
  doc.text(doc.splitTextToSize(depTxt, 86), 110, py); py += depTxt.length > 60 ? 8 : 4;
  const arrTxt = 'Arrivée : ' + (d.arrivee.adresse || '') + ', ' + (d.arrivee.ville || '') + ' (ét. ' + d.arrivee.etage + (d.arrivee.ascenseur ? ', asc.' : '') + ')';
  doc.text(doc.splitTextToSize(arrTxt, 86), 110, py); py += arrTxt.length > 60 ? 8 : 4;
  doc.text('Volume : ' + d.volume + ' m³ · Distance : ' + d.distance + ' km', 110, py);

  y = Math.max(cy, py) + 8;

  // Table header
  doc.setFillColor(26, 26, 26);
  doc.rect(14, y, 182, 7, 'F');
  doc.setTextColor(255);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text('DÉSIGNATION', 17, y + 4.8);
  doc.text('MONTANT HT', 191, y + 4.8, { align: 'right' });
  doc.setTextColor(0);
  doc.setFont('helvetica', 'normal');
  y += 13;

  // Lignes
  doc.setFontSize(9);
  calcul.lignes.forEach(function (l) {
    if (y > 250) { doc.addPage(); y = 20; }
    doc.text(doc.splitTextToSize(l.label, 145), 17, y);
    doc.text(fmt(l.montant), 191, y, { align: 'right' });
    doc.setDrawColor(230);
    doc.line(14, y + 3, 196, y + 3);
    y += 7;
  });

  // Totals
  y += 5;
  if (y > 240) { doc.addPage(); y = 20; }
  doc.setFontSize(9);
  doc.text('Total HT', 140, y);
  doc.text(fmt(calcul.ht), 193, y, { align: 'right' });
  y += 5;
  doc.text('TVA (' + d.tva + '%)', 140, y);
  doc.text(fmt(calcul.tva), 193, y, { align: 'right' });
  y += 3;
  doc.setFillColor(26, 26, 26);
  doc.rect(112, y, 84, 9, 'F');
  doc.setTextColor(255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('TOTAL TTC', 116, y + 6);
  doc.text(fmt(calcul.ttc), 191, y + 6, { align: 'right' });
  doc.setTextColor(0);
  doc.setFont('helvetica', 'normal');
  y += 16;

  // Notes
  if (d.notes) {
    if (y > 240) { doc.addPage(); y = 20; }
    doc.setFontSize(8);
    doc.setTextColor(110);
    doc.text('NOTES', 14, y);
    doc.setTextColor(0);
    doc.setFontSize(9);
    y += 4;
    const noteLines = doc.splitTextToSize(d.notes, 180);
    doc.text(noteLines, 14, y);
    y += noteLines.length * 4 + 4;
  }

  // Signature
  if (y > 260) { doc.addPage(); y = 20; }
  doc.setDrawColor(180);
  doc.line(14, y, 196, y);
  y += 5;
  doc.setFontSize(8);
  doc.setTextColor(110);
  doc.text('Bon pour accord du client, précédé de la mention manuscrite « Bon pour accord » :', 14, y);
  doc.setTextColor(0);
  y += 16;
  doc.setFontSize(9);
  doc.text('Date : ________________', 14, y);
  doc.text('Signature :', 130, y);

  doc.save('devis-' + (d.numero || 'sans-numero') + '.pdf');
  showToast('ok', 'PDF téléchargé');
}

// ============ MAIL & SHARE ============
function genererTexte() {
  const calcul = calculer(state.devis);
  const d = state.devis;
  const e = state.entreprise;
  const lignes = calcul.lignes.map(function (l) {
    return l.label + ' '.repeat(Math.max(1, 40 - l.label.length)) + fmt(l.montant);
  }).join('\n');
  return 'DEVIS ' + (d.numero || '') + '\n' +
    e.nom + '\n' + (e.adresse || '') + '\n' + (e.tel || '') + (e.email ? ' · ' + e.email : '') + '\n' +
    (e.siret ? 'SIRET : ' + e.siret + '\n' : '') +
    '\nÉmis le ' + new Date().toLocaleDateString('fr-FR') + '\n' +
    '\nCLIENT\n' + (d.client.nom || '—') + '\n' + (d.client.tel || '') + '\n' + (d.client.email || '') + '\n' +
    '\nPRESTATION\n' +
    'Date : ' + new Date(d.date).toLocaleDateString('fr-FR') + '\n' +
    'Départ : ' + d.depart.adresse + ', ' + d.depart.ville + ' (ét. ' + d.depart.etage + (d.depart.ascenseur ? ', asc.' : '') + ')\n' +
    'Arrivée : ' + d.arrivee.adresse + ', ' + d.arrivee.ville + ' (ét. ' + d.arrivee.etage + (d.arrivee.ascenseur ? ', asc.' : '') + ')\n' +
    'Volume : ' + d.volume + ' m³ · Distance : ' + d.distance + ' km\n' +
    '\nDÉTAIL\n' + lignes + '\n' +
    '\nTotal HT : ' + fmt(calcul.ht) + '\n' +
    'TVA (' + d.tva + '%) : ' + fmt(calcul.tva) + '\n' +
    'TOTAL TTC : ' + fmt(calcul.ttc) + '\n' +
    (d.notes ? '\n' + d.notes + '\n' : '') +
    '\nBon pour accord du client, précédé de la mention manuscrite « Bon pour accord ».';
}

function envoyerMail() {
  const sujet = 'Devis ' + (state.devis.numero || '') + ' - ' + state.entreprise.nom;
  const corps = genererTexte();
  window.location.href = 'mailto:' + (state.devis.client.email || '') + '?subject=' + encodeURIComponent(sujet) + '&body=' + encodeURIComponent(corps);
}

async function partager() {
  const texte = genererTexte();
  const titre = 'Devis ' + (state.devis.numero || '') + ' - ' + state.entreprise.nom;
  if (navigator.share) {
    try {
      await navigator.share({ title: titre, text: texte });
      return;
    } catch (err) { if (err.name === 'AbortError') return; }
  }
  copierTexte();
}

async function copierTexte() {
  try {
    await navigator.clipboard.writeText(genererTexte());
    showToast('ok', 'Devis copié dans le presse-papier');
  } catch (_) {
    showToast('err', 'Copie impossible');
  }
}

function inp(path, val, opts) {
  opts = opts || {};
  const type = opts.type || 'string';
  const inputType = type === 'number' ? 'number' : (opts.html || 'text');
  const im = opts.im ? ' inputmode="' + opts.im + '"' : '';
  const min = type === 'number' ? ' min="' + (opts.min == null ? 0 : opts.min) + '"' : '';
  const ph = opts.ph ? ' placeholder="' + opts.ph + '"' : '';
  return '<input type="' + inputType + '" data-bind="' + path + '" data-type="' + type + '" value="' + esc(val) + '"' + min + im + ph + ' oninput="onInput(this)" onfocus="selectAll(this)">';
}

function checkbox(path, val, label) {
  return '<label class="check-row"><input type="checkbox" data-bind="' + path + '" data-type="bool"' + (val ? ' checked' : '') + ' onchange="onInput(this)"> ' + esc(label) + '</label>';
}

function renderModal() {
  if (!state.confirmDel) return '';
  return '<div class="modal-overlay" onclick="state.confirmDel=null;render()">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<h3 style="margin:0;font-family:\'Fraunces\',serif;font-size:20px;font-weight:600">Supprimer ce devis ?</h3>' +
      '<p style="color:#666;font-size:14px;margin:8px 0 20px 0">Cette action est définitive.</p>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-secondary" style="flex:1" onclick="state.confirmDel=null;render()">Annuler</button>' +
        '<button class="btn btn-danger" style="flex:1" onclick="supprimer(state.confirmDel)">Supprimer</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function render() {
  let body = '';
  if (state.view === 'historique') body = renderHistorique();
  else if (state.view === 'apercu') body = renderApercu();
  else body = renderNouveau();

  document.getElementById('app').innerHTML = renderHeader() + body + renderModal();
}

// ============ INIT ============
loadAll();
render();
</script>
</body>
</html>
